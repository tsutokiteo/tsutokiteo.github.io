<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Demo Videos - 代表作</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: #f8f9fa;
            color: #1e2a3e;
        }

        .video-card {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 40px;
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.12);
        }

        .video-title {
            padding: 16px 20px;
            font-size: 1.25rem;
            font-weight: 600;
            color: #0a2540;
            border-bottom: 1px solid #eef2f6;
            background: #ffffff;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin: 20px 0 30px 0;
            color: #0f2b3d;
            letter-spacing: -0.3px;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
            }
            .video-title {
                font-size: 1rem;
                padding: 12px 16px;
            }
            .section-title {
                font-size: 1.5rem;
                margin: 10px 0 20px 0;
            }
        }
    </style>
</head>
<body>

    <h1 class="section-title">Demo Videos / 代表作</h1>

    <!-- 视频1: 平成 カバー -->
    <div class="video-card">
        <div class="video-title">
            🎵 【重音テトSV】平成【カバー】
        </div>
        <div class="video-wrapper">
            <iframe 
                src="https://player.bilibili.com/player.html?bvid=BV1daZXBWE9x&page=1&high_quality=1&danmaku=0" 
                allowfullscreen="true"
                loading="lazy">
            </iframe>
        </div>
    </div>

    <!-- 视频2: バカ通信 Remix -->
    <div class="video-card">
        <div class="video-title">
            🎧 【UTAU】バカ通信(Remix)
        </div>
        <div class="video-wrapper">
            <iframe 
                src="https://player.bilibili.com/player.html?bvid=BV1q9PLzKE2d&page=1&high_quality=1&danmaku=0" 
                allowfullscreen="true"
                loading="lazy">
            </iframe>
        </div>
    </div>

</body>
</html>
