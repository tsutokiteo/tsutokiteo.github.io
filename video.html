<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>视频导航页 | 津時的作品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f8f9fa;
            color: #1e2a3e;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f2b3d;
            letter-spacing: -0.3px;
        }

        .page-header p {
            color: #5b6f82;
            margin-top: 8px;
        }

        /* 搜索栏 */
        .search-bar {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }

        .search-bar input {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 1rem;
            border: 1px solid #e0e4e8;
            border-radius: 40px;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: box-shadow 0.2s, border-color 0.2s;
            outline: none;
        }

        .search-bar input:focus {
            border-color: #00a1d6;
            box-shadow: 0 4px 12px rgba(0, 161, 214, 0.1);
        }

        /* 视频网格 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        /* 卡片样式 */
        .video-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.12);
        }

        .video-title {
            padding: 14px 16px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0a2540;
            background: white;
            border-bottom: 1px solid #eef2f6;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 无结果提示 */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #8a9bb0;
            font-size: 1.1rem;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            body {
                padding: 16px;
            }
            .video-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .video-title {
                font-size: 1rem;
                padding: 12px 14px;
            }
            .page-header h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
